name: CI/CD Pipeline

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Lint Codebase
        run: npm run lint

      - name: Run Server Tests
        run: npm run test --workspace server

      - name: Build Client
        env:
          VITE_API_URL: https://api.blippr.in
          VITE_SOCKET_URL: https://api.blippr.in
          VITE_SUPABASE_URL: https://ekkpkjgquiarufexfoiy.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_sdwPq0LDCBwwtv446BbVpA_iEmXMDEC
        run: npm run build --workspace client

  deploy-frontend:
    name: Deploy Frontend to Cloudflare Pages
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Client
        env:
          VITE_API_URL: https://api.blippr.in
          VITE_SOCKET_URL: https://api.blippr.in
          VITE_SUPABASE_URL: https://ekkpkjgquiarufexfoiy.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_sdwPq0LDCBwwtv446BbVpA_iEmXMDEC
        run: npm run build --workspace client

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy client/dist --project-name=blippr --branch=main
