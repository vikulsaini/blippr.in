<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Resilient recovery for PWA / Service Worker stale chunk loading issues
      window.addEventListener('error', function(e) {
        var targetEl = e.target;
        var isScript = false;
        var isLink = false;
        
        if (targetEl) {
          var tag = (targetEl.tagName || targetEl.nodeName || '').toUpperCase();
          if (tag === 'SCRIPT') {
            var src = targetEl.src || '';
            // Only flag same-origin scripts (our own build chunks)
            if (!src || src.indexOf(window.location.origin) === 0 || (src.indexOf('http') !== 0 && src.indexOf('//') !== 0)) {
              isScript = true;
            }
          } else if (tag === 'LINK') {
            var href = targetEl.href || '';
            // Only flag same-origin stylesheets/assets
            if (!href || href.indexOf(window.location.origin) === 0 || (href.indexOf('http') !== 0 && href.indexOf('//') !== 0)) {
              isLink = true;
            }
          }
        }
        
        var errMessage = (e.message || '').toLowerCase();
        var isChunkError = errMessage.indexOf('chunk') > -1 || 
                           errMessage.indexOf('loading css') > -1 || 
                           errMessage.indexOf('failed to fetch dynamically imported module') > -1;
        
        if (isScript || isLink || isChunkError) {
          console.warn('Stale resource load failure detected. Clearing PWA caches and unregistering Service Workers...', e);
          
          var swCleared = false;
          var cacheCleared = false;
          
          function checkAndReload() {
            if (swCleared && cacheCleared) {
              console.log('Cache and SW cleared. Reloading page...');
              window.location.reload(true);
            }
          }

          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(registrations) {
              if (!registrations || registrations.length === 0) {
                swCleared = true;
                checkAndReload();
              } else {
                var promises = [];
                for (var i = 0; i < registrations.length; i++) {
                  promises.push(registrations[i].unregister());
                }
                Promise.all(promises).then(function() {
                  swCleared = true;
                  checkAndReload();
                }).catch(function() {
                  swCleared = true;
                  checkAndReload();
                });
              }
            }).catch(function() {
              swCleared = true;
              checkAndReload();
            });
          } else {
            swCleared = true;
          }

          if ('caches' in window) {
            caches.keys().then(function(keys) {
              if (!keys || keys.length === 0) {
                cacheCleared = true;
                checkAndReload();
              } else {
                Promise.all(keys.map(function(key) {
                  return caches.delete(key);
                })).then(function() {
                  cacheCleared = true;
                  checkAndReload();
                }).catch(function() {
                  cacheCleared = true;
                  checkAndReload();
                });
              }
            }).catch(function() {
              cacheCleared = true;
              checkAndReload();
            });
          } else {
            cacheCleared = true;
          }

          // Fallback reload if SW/cache cleanup takes too long
          setTimeout(function() {
            window.location.reload(true);
          }, 1200);
        }
      }, true);
    </script>
    <script>
      // Fast check for active user authentication to avoid flashing landing page LCP shell
      (function() {
        try {
          var token = localStorage.getItem('blippr_token');
          if (!token || token === 'null' || token === 'undefined') {
            for (var i = 0; i < localStorage.length; i++) {
              var key = localStorage.key(i);
              if (key && key.indexOf('sb-') === 0 && key.indexOf('-auth-token') > -1) {
                var sessionStr = localStorage.getItem(key);
                if (sessionStr) {
                  var session = JSON.parse(sessionStr);
                  if (session && session.access_token) {
                    token = session.access_token;
                    break;
                  }
                }
              }
            }
          }
          if (token && token !== 'null' && token !== 'undefined') {
            document.documentElement.classList.add('logged-in-state');
          } else {
            document.documentElement.classList.add('logged-out-state');
          }
        } catch (e) {
          console.warn('LCP script error:', e);
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" />
    <meta name="description" content="blippr.in — Random connections, authentic friendships. Meet people through live chat and video, send friend requests, and keep the good conversations going." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/icons/blippr-icon.png" />
    <title>blippr.in — Random Chat & Friends</title>
    <style>
      /* Critical CSS for Instant Paint (LCP and Hero Layout) */
      :root {
        --mouse-x: 50%;
        --mouse-y: 50%;
      }
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background-color: #0b1326;
        color: #dbe2fd;
        font-family: "Geist", -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", "Inter", sans-serif;
      }
      .lcp-container {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
        text-align: center;
        padding: 80px 20px 20px 20px;
        box-sizing: border-box;
        position: relative;
        background-color: #0b1326;
        overflow: hidden;
      }
      .lcp-glow {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, -20%);
        width: 850px;
        height: 550px;
        background: radial-gradient(circle, rgba(124, 58, 237, 0.1) 0%, rgba(124, 58, 237, 0) 70%);
        border-radius: 50%;
        pointer-events: none;
      }
      .lcp-badge {
        margin-bottom: 20px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid rgba(210, 187, 255, 0.15);
        background-color: rgba(210, 187, 255, 0.05);
        border-radius: 9999px;
        padding: 8px 16px;
        font-size: 12px;
        font-weight: 700;
        color: #d2bbff;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .lcp-heading {
        max-width: 800px;
        font-size: 3rem;
        font-weight: 800;
        line-height: 1.15;
        color: #ffffff;
        margin: 20px 0 24px 0;
        letter-spacing: -0.02em;
      }
      .lcp-heading span {
        color: #958da1;
      }
      .lcp-paragraph {
        max-width: 650px;
        font-size: 1.125rem;
        font-weight: 500;
        line-height: 1.6;
        color: #ccc3d8;
        margin: 0 auto 32px auto;
      }
      .lcp-buttons {
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .lcp-btn-primary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 28px;
        border-radius: 9999px;
        font-size: 14px;
        font-weight: 700;
        background-color: #7C3AED;
        color: #ffffff;
        border: 1px solid #7C3AED;
        box-shadow: 0 4px 14px rgba(124, 58, 237, 0.25);
        text-decoration: none;
      }
      .lcp-btn-secondary {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 28px;
        border-radius: 9999px;
        font-size: 14px;
        font-weight: 600;
        background-color: rgba(30, 41, 59, 0.7);
        color: #dbe2fd;
        border: 1px solid rgba(255, 255, 255, 0.1);
        text-decoration: none;
      }
      #lcp-shell {
        position: fixed;
        inset: 0;
        z-index: 50;
        background-color: #0b1326;
        pointer-events: auto;
      }
      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade-in-up {
        animation: fadeInUp 0.55s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .delay-100 {
        animation-delay: 100ms;
      }
      .delay-200 {
        animation-delay: 200ms;
      }
      .delay-300 {
        animation-delay: 300ms;
      }
      .delay-400 {
        animation-delay: 400ms;
      }
      @keyframes slideLeft {
        from {
          transform: translateX(100%);
        }
        to {
          transform: translateX(0);
        }
      }
      .animate-slide-left {
        animation: slideLeft 0.3s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .animate-fadeIn {
        animation: fadeIn 0.25s ease-out forwards;
      }
      @media (max-width: 640px) {
        .lcp-heading {
          font-size: 2.25rem;
        }
        .lcp-paragraph {
          font-size: 1rem;
        }
        .lcp-container {
          padding-top: 60px;
        }
        .lcp-buttons {
          flex-direction: column;
          width: 100%;
          max-width: 280px;
        }
      }
      
      /* Logged in state customizations to prevent flashing landing content */
      .logged-in-state .lcp-content-wrapper {
        display: none !important;
      }
      .logged-in-state .lcp-app-loading {
        display: flex !important;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100%;
        width: 100%;
        position: absolute;
        inset: 0;
        z-index: 10;
        box-sizing: border-box;
        padding: 24px;
        background-color: #0b1326;
      }
      @keyframes lcp-shimmer {
        0% { background-color: rgba(124, 58, 237, 0.08); }
        50% { background-color: rgba(124, 58, 237, 0.25); }
        100% { background-color: rgba(124, 58, 237, 0.08); }
      }
      .lcp-skeleton-logo {
        width: 40px;
        height: 40px;
        border-radius: 16px;
        border: 1px solid rgba(124, 58, 237, 0.2);
        box-shadow: 0 0 20px rgba(124, 58, 237, 0.2);
        animation: lcp-shimmer 1.5s ease-in-out infinite;
      }
      .lcp-skeleton-text {
        margin-top: 16px;
        font-size: 14px;
        font-weight: 600;
        color: #94a3b8;
        letter-spacing: -0.01em;
      }
    </style>
  </head>
  <body>
    <!-- Critical Pre-rendered LCP Shell -->
    <div id="lcp-shell" class="lcp-container">
      <div class="lcp-glow"></div>
      
      <!-- Landing content shown to logged-out users -->
      <div class="lcp-content-wrapper" style="width: 100%; display: flex; flex-direction: column; align-items: center;">
        <div class="lcp-badge" style="margin-bottom: 20px;">
          ★ Random chats, real connections
        </div>
        <h1 class="lcp-heading">
          Blipp faster than <br>
          <span style="color: #7C3AED; font-style: italic;">you think.</span>
        </h1>
        <p class="lcp-paragraph">
          The electric social engine for real-time digital sparks. Connect instantly, chat fluidly, and find your vibe in a heartbeat.
        </p>
        <div class="lcp-buttons">
          <a href="/auth" class="lcp-btn-primary">Start Blipping</a>
          <a href="/auth" class="lcp-btn-secondary">Stranger Match</a>
        </div>
      </div>

      <!-- Clean loading state shown to logged-in users on refresh -->
      <div class="lcp-app-loading" style="display: none;">
        <div class="lcp-skeleton-logo"></div>
        <p class="lcp-skeleton-text">Loading Blippr</p>
      </div>
    </div>
    
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
