<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F8FAFC" />
    <meta name="description" content="blippr.in — Random connections, authentic friendships. Meet people through live chat and video, send friend requests, and keep the good conversations going." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/blippr-icon.svg" />
    <title>blippr.in — Random Chat & Friends</title>
    <!-- Flash-free theme init: apply dark-theme class before first paint -->
    <script>
      (function() {
        var t = localStorage.getItem('blippr_theme');
        if (t === 'dark') {
          document.documentElement.classList.add('dark-theme');
          document.querySelector('meta[name="theme-color"]').setAttribute('content', '#0B1120');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
